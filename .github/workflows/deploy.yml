name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install deploy dependencies
        run: pip install -r deploy/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK deploy
        working-directory: deploy
        env:
          AWS_ACCOUNT: ${{ vars.AWS_ACCOUNT }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          STAGE: ${{ vars.STAGE || 'prod' }}
          GITHUB_SECRET_NAME: ${{ vars.GH_SECRET_NAME || 'github-pr-agent/github' }}
          ALLOWED_REPOS: ${{ vars.ALLOWED_REPOS }}
          TERRAFORM_VALIDATION_REPOS: ${{ vars.TERRAFORM_VALIDATION_REPOS }}
          WEEKLY_REVIEW_LIMIT: ${{ vars.WEEKLY_REVIEW_LIMIT || '2' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'info' }}
        run: cdk deploy --all --require-approval never
