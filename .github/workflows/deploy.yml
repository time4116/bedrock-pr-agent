name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Test and security checks
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v5

      - name: Run unit tests
        run: |
          python3 -m unittest \
            tests.test_config_security \
            tests.test_public_repo_safety \
            tests.test_github_comment_idempotency \
            tests.test_pr_diff_fetcher \
            -v

      - name: Compile Python sources
        run: |
          python3 -m compileall -q \
            src \
            pr_agent.py \
            deploy \
            scripts/create_github_app.py \
            scripts/create_deploy_role.py \
            tests

      - name: Run Bandit static security scan
        run: uvx bandit -q -r src scripts deploy pr_agent.py -x tests

      - name: Audit Python dependencies
        run: uv tool run --python 3.12 --from pip-audit pip-audit -r requirements.txt

  deploy:
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install deploy dependencies
        run: pip install -r deploy/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK deploy
        working-directory: deploy
        env:
          AWS_ACCOUNT: ${{ secrets.AWS_ACCOUNT }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          STAGE: ${{ vars.STAGE || 'prod' }}
          GITHUB_SECRET_NAME: ${{ secrets.GH_SECRET_NAME || 'github-pr-agent/github' }}
          BEDROCK_MODEL_ID: ${{ secrets.BEDROCK_MODEL_ID }}
          ALLOWED_REPOS: ${{ vars.ALLOWED_REPOS }}
          TERRAFORM_VALIDATION_REPOS: ${{ vars.TERRAFORM_VALIDATION_REPOS }}
          WEEKLY_REVIEW_LIMIT: ${{ vars.WEEKLY_REVIEW_LIMIT || '2' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'info' }}
        run: cdk deploy --all --require-approval never
