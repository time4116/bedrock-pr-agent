AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GitHub PR Agent - PR Validation with AgentCore

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment stage
  
  AgentEntrypoint:
    Type: String
    Default: pr_agent.py
    Description: Python file containing the agent definition
  
  AgentRuntimeName:
    Type: String
    Default: pr-agent
    Description: Name for the AgentCore Runtime
  
  GitHubSecretName:
    Type: String
    Default: github-pr-agent/github
    Description: Secrets Manager secret name for GitHub App credentials

  BedrockModelId:
    Type: String
    Default: arn:aws:bedrock:us-east-1:YOUR_ACCOUNT_ID:inference-profile/global.anthropic.claude-sonnet-4-20250514-v1:0
    Description: Bedrock model ID for Claude
  
  AllowedRepos:
    Type: String
    Default: your-org/your-repo
    Description: Comma-separated list of allowed GitHub repositories

  TerraformValidationRepos:
    Type: String
    Default: ''
    Description: Comma-separated list of repos that receive Terraform plan validation

  OrgPolicyCheckEnabled:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable organization policy checking (add policy docs to policies/ directory)

  AgentArn:
    Type: String
    Default: ''
    Description: AgentCore Runtime ARN (auto-generated if not provided)

  LogLevel:
    Type: String
    Default: info
    AllowedValues:
      - debug
      - info
      - warning
      - error
    Description: Logging level
  
  # Cost Attribution Parameters (Organization Standards)
  EnableCostAttribution:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether to create and use application inference profiles for cost attribution
  
  CostApplicationName:
    Type: String
    Default: 'your-app-name'
    Description: Application name for cost allocation (cost_application_name)
  
  CostParProduct:
    Type: String
    Default: 'your-product'
    Description: Product name for cost allocation (cost_par_product)
  
  CostScrumTeam:
    Type: String
    Default: 'your-team'
    Description: Scrum team for cost allocation (cost_scrum_team)
  
  CostServiceName:
    Type: String
    Default: 'github-pr-agent'
    Description: Service name for cost allocation (cost_service_name)

Conditions:
  HasAgentArn: !Not [!Equals [!Ref AgentArn, '']]
  EnableCostAttribution: !Equals [!Ref EnableCostAttribution, 'true']

Globals:
  Function:
    Runtime: python3.11
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        GITHUB_SECRET_NAME: !Ref GitHubSecretName
        BEDROCK_MODEL_ID: !If
          - EnableCostAttribution
          - !GetAtt LambdaInferenceProfile.InferenceProfileArn
          - !Ref BedrockModelId
        ALLOWED_REPOS: !Ref AllowedRepos
        ENABLE_COST_ATTRIBUTION: !Ref EnableCostAttribution
        TERRAFORM_VALIDATION_REPOS: !Ref TerraformValidationRepos
        ORG_POLICY_CHECK_ENABLED: !Ref OrgPolicyCheckEnabled
        AGENT_ARN: !Ref AgentArn
        STAGE: !Ref Stage
        LOG_LEVEL: !Ref LogLevel
        SQS_QUEUE_URL: !Ref PRAnalysisQueue

Resources:
  # SQS Queues
  PRAnalysisQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub github-pr-agent-${Stage}-pr-analysis
      VisibilityTimeout: 1200  # 20 minutes (worker timeout + 5min buffer)
      MessageRetentionPeriod: 86400  # 24 hours
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt PRAnalysisDeadLetterQueue.Arn
        maxReceiveCount: 3
  
  PRAnalysisDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub github-pr-agent-${Stage}-pr-analysis-dlq
      MessageRetentionPeriod: 1209600  # 14 days
  
  # Application Inference Profiles for Cost Attribution
  LambdaInferenceProfile:
    Type: AWS::Bedrock::ApplicationInferenceProfile
    Condition: EnableCostAttribution
    Properties:
      InferenceProfileName: !Sub github-pr-agent-${Stage}-lambda-agentcore
      Description: !Sub GitHub-PR-Agent-${Stage}-Lambda-AgentCore-usage
      ModelSource:
        CopyFrom: !Ref BedrockModelId
      Tags:
        - Key: cost_application_name
          Value: !Ref CostApplicationName
        - Key: cost_environment
          Value: !Ref Stage
        - Key: cost_par_product
          Value: !Ref CostParProduct
        - Key: cost_scrum_team
          Value: !Ref CostScrumTeam
        - Key: cost_service_name
          Value: !Ref CostServiceName
        - Key: Application
          Value: Lambda-AgentCore
        - Key: Component
          Value: PR-Analysis-Lambda
        - Key: ManagedBy
          Value: CloudFormation
  
  # IAM Role for Webhook Lambda (needs GitHub secret for signature verification only)
  WebhookExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub github-pr-agent-${Stage}-webhook-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: cost_application_name
          Value: !Ref CostApplicationName
        - Key: cost_environment
          Value: !Ref Stage
        - Key: cost_par_product
          Value: !Ref CostParProduct
        - Key: cost_scrum_team
          Value: !Ref CostScrumTeam
        - Key: cost_service_name
          Value: !Ref CostServiceName
        - Key: Component
          Value: webhook-lambda
        - Key: ManagedBy
          Value: CloudFormation
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GitHubSecretAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:github-pr-agent/*
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub secretsmanager.${AWS::Region}.amazonaws.com
        - PolicyName: SQSSendAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt PRAnalysisQueue.Arn
  
  # IAM Role for Worker Lambda (only invokes AgentCore, no direct secret access)
  WorkerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub github-pr-agent-${Stage}-worker-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: cost_application_name
          Value: !Ref CostApplicationName
        - Key: cost_environment
          Value: !Ref Stage
        - Key: cost_par_product
          Value: !Ref CostParProduct
        - Key: cost_scrum_team
          Value: !Ref CostScrumTeam
        - Key: cost_service_name
          Value: !Ref CostServiceName
        - Key: Component
          Value: worker-lambda
        - Key: ManagedBy
          Value: CloudFormation
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentCoreInvokeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                Resource: '*'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:github-pr-agent/*
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource: !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub secretsmanager.${AWS::Region}.amazonaws.com
        - PolicyName: SQSReceiveAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt PRAnalysisQueue.Arn
                  - !GetAtt PRAnalysisDeadLetterQueue.Arn
  
  # IAM Role for AgentCore Runtime
  AgentCoreExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub github-pr-agent-${Stage}-agentcore-role
      Description: !Sub AgentCore Runtime execution role for ${Stage} environment
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Tags:
        - Key: cost_application_name
          Value: !Ref CostApplicationName
        - Key: cost_environment
          Value: !Ref Stage
        - Key: cost_par_product
          Value: !Ref CostParProduct
        - Key: cost_scrum_team
          Value: !Ref CostScrumTeam
        - Key: cost_service_name
          Value: !Ref CostServiceName
        - Key: Component
          Value: agentcore-runtime
        - Key: Application
          Value: github-pr-agent
        - Key: ManagedBy
          Value: CloudFormation
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:github-pr-agent/*
                  - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:bedrock-agentcore-identity!default/oauth2/*
                  - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:bedrock-agentcore-identity!default/apikey/*
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource: !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub secretsmanager.${AWS::Region}.amazonaws.com
        - PolicyName: AgentCoreRuntimeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRImageAccess
                Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/*
              - Sid: ECRTokenAccess
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:DescribeLogStreams
                  - logs:CreateLogGroup
                  - logs:DescribeLogGroups
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*:log-stream:*
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: '*'
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: bedrock-agentcore
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:PutDeliverySource
                  - logs:PutDeliveryDestination
                  - logs:CreateDelivery
                  - logs:GetDeliverySource
                  - logs:DeleteDeliverySource
                  - logs:DeleteDeliveryDestination
                Resource: '*'
              - Sid: BedrockAgentCoreRuntime
                Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                  - bedrock-agentcore:InvokeAgentRuntimeForUser
                Resource: !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*
              - Sid: BedrockAgentCoreMemoryCreateMemory
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateMemory
                Resource: '*'
              - Sid: BedrockAgentCoreMemory
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:GetEvent
                  - bedrock-agentcore:GetMemory
                  - bedrock-agentcore:GetMemoryRecord
                  - bedrock-agentcore:ListActors
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:ListMemoryRecords
                  - bedrock-agentcore:ListSessions
                  - bedrock-agentcore:DeleteEvent
                  - bedrock-agentcore:DeleteMemoryRecord
                  - bedrock-agentcore:RetrieveMemoryRecords
                Resource: !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:memory/*
              - Sid: BedrockAgentCoreIdentityGetResourceApiKey
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetResourceApiKey
                Resource:
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default/apikeycredentialprovider/*
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/*
              - Sid: BedrockAgentCoreIdentityGetResourceOauth2Token
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetResourceOauth2Token
                Resource:
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default/oauth2credentialprovider/*
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/pr_agent-*
              - Sid: BedrockModelInvocation
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ApplyGuardrail
                Resource:
                  - arn:aws:bedrock:*::foundation-model/*
                  - arn:aws:bedrock:*:*:inference-profile/*
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:*
              - Sid: BedrockKnowledgeBaseAccess
                Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*
              - Sid: MarketplaceSubscribeOnFirstCall
                Effect: Allow
                Action:
                  - aws-marketplace:ViewSubscriptions
                  - aws-marketplace:Subscribe
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:CalledViaLast: bedrock.amazonaws.com
              - Sid: BedrockAgentCoreCodeInterpreter
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateCodeInterpreter
                  - bedrock-agentcore:StartCodeInterpreterSession
                  - bedrock-agentcore:InvokeCodeInterpreter
                  - bedrock-agentcore:StopCodeInterpreterSession
                  - bedrock-agentcore:DeleteCodeInterpreter
                  - bedrock-agentcore:ListCodeInterpreters
                  - bedrock-agentcore:GetCodeInterpreter
                  - bedrock-agentcore:GetCodeInterpreterSession
                  - bedrock-agentcore:ListCodeInterpreterSessions
                Resource:
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:aws:code-interpreter/*
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:code-interpreter/*
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:code-interpreter-custom/*
              - Sid: BedrockAgentCoreIdentity
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateWorkloadIdentity
                  - bedrock-agentcore:GetWorkloadAccessTokenForUserId
                Resource:
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/*
              - Sid: AwsJwtFederation
                Effect: Allow
                Action: sts:GetWebIdentityToken
                Resource: '*'
  
  # Webhook Lambda Function
  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub github-pr-agent-${Stage}-webhook
      CodeUri: .
      Handler: src/handlers/webhook.handler
      Timeout: 10
      Role: !GetAtt WebhookExecutionRole.Arn
      Events:
        WebhookApi:
          Type: Api
          Properties:
            Path: /webhook
            Method: post
            RestApiId: !Ref WebhookApi
  
  # Worker Lambda Function
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub github-pr-agent-${Stage}-worker
      CodeUri: .
      Handler: src/handlers/worker_agentcore.handler
      Timeout: 900  # 15 minutes for AgentCore invocation (max Lambda timeout)
      ReservedConcurrentExecutions: 10
      Role: !GetAtt WorkerExecutionRole.Arn
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt PRAnalysisQueue.Arn
            BatchSize: 1
            Enabled: true
  
  # API Gateway
  WebhookApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub github-pr-agent-${Stage}-api
      StageName: !Ref Stage
      EndpointConfiguration:
        Type: REGIONAL
      Cors:
        AllowMethods: "'POST'"
        AllowHeaders: "'Content-Type,X-GitHub-Event,X-Hub-Signature-256'"
        AllowOrigin: "'*'"

Outputs:
  WebhookUrl:
    Description: Webhook endpoint URL
    Value: !Sub https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/webhook
    Export:
      Name: !Sub ${AWS::StackName}-WebhookUrl
  
  WebhookFunctionArn:
    Description: Webhook Lambda function ARN
    Value: !GetAtt WebhookFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-WebhookFunctionArn
  
  WorkerFunctionArn:
    Description: Worker Lambda function ARN
    Value: !GetAtt WorkerFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-WorkerFunctionArn
  
  QueueUrl:
    Description: SQS queue URL
    Value: !Ref PRAnalysisQueue
    Export:
      Name: !Sub ${AWS::StackName}-QueueUrl
  
  DeadLetterQueueUrl:
    Description: SQS dead letter queue URL
    Value: !Ref PRAnalysisDeadLetterQueue
    Export:
      Name: !Sub ${AWS::StackName}-DeadLetterQueueUrl
  
  ConfiguredAgentArn:
    Condition: HasAgentArn
    Description: AgentCore Runtime ARN (from parameter)
    Value: !Ref AgentArn
    Export:
      Name: !Sub ${AWS::StackName}-AgentArn
  
  AgentCoreExecutionRoleArn:
    Description: IAM role ARN for AgentCore Runtime execution
    Value: !GetAtt AgentCoreExecutionRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-AgentCoreExecutionRoleArn
  
  # Cost Attribution Outputs
  CostAttributionEnabled:
    Description: Whether cost attribution via application inference profiles is enabled
    Value: !Ref EnableCostAttribution
    Export:
      Name: !Sub ${AWS::StackName}-CostAttributionEnabled
  
  LambdaInferenceProfileArn:
    Condition: EnableCostAttribution
    Description: Application inference profile ARN for Lambda/AgentCore cost tracking
    Value: !GetAtt LambdaInferenceProfile.InferenceProfileArn
    Export:
      Name: !Sub ${AWS::StackName}-LambdaInferenceProfileArn
  
  CurrentBedrockModel:
    Description: Currently configured Bedrock model (system or application inference profile)
    Value: !If
      - EnableCostAttribution
      - !GetAtt LambdaInferenceProfile.InferenceProfileArn
      - !Ref BedrockModelId
    Export:
      Name: !Sub ${AWS::StackName}-CurrentBedrockModel
