services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock   # CDK needs Docker to build/push the AgentCore image
    env_file:
      - path: .env
        required: false
    working_dir: /workspace
    stdin_open: true
    tty: true
