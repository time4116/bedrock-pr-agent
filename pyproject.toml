[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(\.eggs|\.git|\.venv|venv|build|dist|node_modules|\.serverless)/
'''

[tool.flake8]
max-line-length = 100
exclude = [".git", "__pycache__", ".venv", "venv", "dist", "build", "node_modules"]
ignore = ["E203", "W503"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
